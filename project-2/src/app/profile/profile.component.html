
@if (isClicked==true) {
    <router-outlet></router-outlet>
}
@else {
<div class="container bg-light shadow p-3 mb-5 bg-body rounded" style="margin-top: 20px; border-radius: 10px; width: 50%;">
    <div class="row">
        <div class="col-lg-12 d-flex justify-content-between align-items-center">
            <div>
                <h4>Category Name</h4>
                <span>{{ exam.name }}</span>
            </div>
            <div>
                <button type="button" class="btn btn-success" (click)="onClick(exam.id)">Edit</button>
            </div>
        </div>
    </div>
    <hr>
    <div>
        <form class="row g-3">
            <div class="col-md-6">
                <label  class="form-label">Type</label>
                <input type="text" class="form-control" id="inputEmail4" placeholder="" value="{{ exam.type }}">
            </div>
            <div class="col-md-6">
                <label for="inputPassword4" class="form-label">Courses</label>
                <input type="number" class="form-control" id="inputPassword4"value="{{ exam.course }}">
            </div>
            <div class="col-6">
                <label for="inputAddress" class="form-label">Quizzes</label>
                <input type="text" class="form-control" id="inputAddress" value="{{ exam.quizzes }}">
            </div>
            <div class="col-6">
                <label for="inputAddress" class="form-label">Created</label>
                <input type="text" class="form-control" id="inputDate"value="{{ exam.created }}">
            </div>

           
            <div>
                <label for="inputState" class="form-label">Status</label>
                <select id="inputState" class="form-select">
                <option selected>{{ exam.status }}</option>
                <option>Active</option>
                <option>Inactive</option>

                </select>
            </div>

            
        </form>
        
    </div>
</div>
}
<p>profile works!</p>
