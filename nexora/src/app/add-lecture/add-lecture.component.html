<div class="container">
  <div class="block">
    <label class="block-lable"> Title : </label>
    <input type="text" placeholder="New Course" />
  </div>

  <div class="bolck">
    <label class="block-lable"> Discription: </label>
    <div class="discription-box">
      <div class="discription-tool">
        <button
          type="button"
          class="btn btn-light"
          mat-icon-button(click)="execCmd('undo')"
        >
          <mat-icon class="icon">undo</mat-icon>
        </button>

        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (click)="execCmd('redo')"
        >
          <mat-icon class="icon">redo</mat-icon>
        </button>

        <span class="divider"></span>

        <button mat-button type="button" class="select">
          Normal text
          <mat-icon>expand_more</mat-icon>
        </button>

        <span class="divider"></span>

        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">format_list_bulleted</mat-icon>
        </button>

        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (mousedown)="$event.preventDefault()"
          (click)="execCmd('bold')"
        >
          <mat-icon class="icon">format_bold</mat-icon>
        </button>

        <button
          type="button"
          class="btn btn-light"
          mat-icon-button
          (mousedown)="$event.preventDefault()"
          [class.editor__toolbar-btn--active]="activeFormats.italic"
          (click)="execCmd('italic')"
        >
          <mat-icon class="icon">format_italic</mat-icon>
        </button>

        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">format_underlined</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">code</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">link</mat-icon>
        </button>

        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">image</mat-icon>
        </button>

        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">data_object</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">format_quote</mat-icon>
        </button>
        <button type="button" class="btn btn-light" mat-icon-button>
          <mat-icon class="icon">remove</mat-icon>
        </button>
      </div>

      <textarea contenteditable="true" class="text-area"></textarea>
    </div>
  </div>

  <div class="upload-block">
  <div class="upload">
    <label class="block-lable"> Featured Image </label>
    <div class="box">
      <div class="box-upload">
        <div *ngIf="thumbnail" class="box-upload__preview-wrap">
          <img
            [src]="thumbnail"
            alt="Thumbnail preview"
            class="box-upload__img"
          />
          <button class="btn btn-light remove-btn" (click)="removeThumbnail()">
            <mat-icon>close</mat-icon>
          </button>
        </div>

        <div *ngIf="!thumbnail" class="box-upload__preview-wrap">
          <mat-icon>image</mat-icon>
          <div>
            <input
              type="file"
              style="display: none"
              (change)="onFileSelect($event)"
              #fileInput
            />
            <button
              class="btn btn-light next option-btn"
              (click)="fileInput.click()"
            >
              Upload Thumnail
            </button>
          </div>
          <p>jpg, png, gif and web format up to ***MB</p>
        </div>
      </div>
    </div>
  </div>
  <div class="upload">
    <label class="block-lable"> Video Intro </label>
    <div class="box">
      <div class="box-upload">
        <div *ngIf="video" class="box-upload__preview-wrap">
          <video [src]="video" controls class="box-upload__video"></video>
          <button class="btn btn-light remove-btn" (click)="removeVideo()">
            <mat-icon>close</mat-icon>
          </button>
        </div>

        <div *ngIf="!video" class="box-upload__preview-wrap">
          <mat-icon>videocam</mat-icon>
          <div>
            <input
              type="file"
              accept="video/*"
              style="display: none"
              (change)="onVideoSelect($event)"
              #videoInput
            />
            <button
              class="btn btn-light next option-btn"
              (click)="videoInput.click()"
            >
              Upload video
            </button>
          </div>
          <p>MP4, MOV, WEBM accepted up to 500MB</p>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div class="block">
        <label class="block-lable">
            Video Playback time
        </label>
        <div class="time">
            <div class="start">
                <span>Start time </span>
                <form action="post">
                    <input type="number" placeholder="hours">
                    <input type="number" placeholder="hours">
                    <input type="number" placeholder="hours">
                </form>
            </div>

            <div class="end">
                <span>End time </span>
                <form action="post">
                    <input type="number" placeholder="hours">
                    <input type="number" placeholder="hours">
                    <input type="number" placeholder="hours">
                </form>
            </div>
        </div>
        <div class="radio">
            <mat-radio-group aria-label="Select an option">
                <mat-radio-button value="1">Import Notes</mat-radio-button>
                <mat-radio-button value="2">Uplaod Notes</mat-radio-button>
            </mat-radio-group>
        </div>
  </div>

</div>
