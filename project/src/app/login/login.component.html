<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.component.css">
    <title>Login Bootstrap 5</title>
</head>

<body>
    <div class="container" *ngIf="!islogin">
        <app-b-login></app-b-login>
        <div class="wrapper d-flex align-items-center justify-content-center h-100">
            <div class="card login-form">
                <div class="card-body">
                    <h5 class="card-title text-center">Login Form</h5>
                    <form>
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">UserName</label>
                            <input type="text" class="form-control" id="exampleInputEmail1"name="UserName" [(ngModel)]="login.UserName">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Password</label>
                            <input type="text" class="form-control" id="exampleInputPassword1"name="Password" [(ngModel)]="login.Password">
                        </div>
                        <button type="button" class="btn btn-primary w-100" (click)="onLogin()">Submit</button>
                        <div class="sign-up mt-4">
                            Don't have an account? <a href="#">Create One</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container" *ngIf="islogin">
        <div class="row">
            <div class="col-lg-12">

                <ul class="nav justify-content-center fw-4 fs-4 " style="gap: 8rem; color: black;">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" routerLink="/home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" routerLink="/about">about</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active"  routerLink="seller">seller</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="orders">orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="profile">profile</a>
                    </li>
                </ul>
            </div>
        </div>

        <router-outlet></router-outlet>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
